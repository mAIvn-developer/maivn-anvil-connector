allow_embedding: false
db_schema:
  maivn_events:
    title: maivn_events
    access: {python_name: maivn_events, server: full, client: none}
    columns:
      c_session_id: {name: session_id, type: string}
      c_seq: {name: seq, type: number}
      c_kind: {name: kind, type: string}
      c_payload: {name: payload, type: simpleObject}
      c_created: {name: created, type: datetime}
  maivn_io:
    title: maivn_io
    access: {python_name: maivn_io, server: full, client: none}
    columns:
      c_session_id: {name: session_id, type: string}
      c_interrupt_id: {name: interrupt_id, type: string}
      c_prompt: {name: prompt, type: string}
      c_input_type: {name: input_type, type: string}
      c_choices: {name: choices, type: simpleObject}
      c_response: {name: response, type: string}
      c_status: {name: status, type: string}
      c_is_private: {name: is_private, type: bool}
metadata:
  description: Connect Anvil app backends to mAIvn services for agent orchestration.
  title: mAIvn Anvil Connector
name: maivn_anvil_connector
native_deps:
  head_html: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Bricolage+Grotesque:wght@600;700&display=swap" rel="stylesheet">
package_name: maivn_anvil_connector
startup_form: Startup
runtime_options:
  client_version: '3'
  server_spec: null
  server_version: python3-full
  version: 2
services: []
