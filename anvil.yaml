allow_embedding: false
db_schema:
  maivn_events:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      name: session_id
      type: string
    - admin_ui: {order: 1, width: 120}
      name: seq
      type: number
    - admin_ui: {order: 2, width: 160}
      name: kind
      type: string
    - admin_ui: {order: 3, width: 280}
      name: payload
      type: simpleObject
    - admin_ui: {order: 4, width: 200}
      name: created
      type: datetime
    server: full
    title: maivn_events
  maivn_io:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      name: session_id
      type: string
    - admin_ui: {order: 1, width: 200}
      name: interrupt_id
      type: string
    - admin_ui: {order: 2, width: 240}
      name: prompt
      type: string
    - admin_ui: {order: 3, width: 120}
      name: input_type
      type: string
    - admin_ui: {order: 4, width: 200}
      name: choices
      type: simpleObject
    - admin_ui: {order: 5, width: 200}
      name: response
      type: string
    - admin_ui: {order: 6, width: 120}
      name: status
      type: string
    - admin_ui: {order: 7, width: 100}
      name: is_private
      type: bool
    server: full
    title: maivn_io
metadata:
  description: Connect Anvil app backends to mAIvn services for agent orchestration.
  title: mAIvn Anvil Connector
name: maivn_anvil_connector
native_deps:
  head_html: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Bricolage+Grotesque:wght@600;700&display=swap" rel="stylesheet">
package_name: maivn_anvil_connector
startup_form: Startup
runtime_options:
  client_version: '3'
  server_spec: null
  server_version: python3-full
  version: 2
services:
- client_config: {}
  server_config: {auto_create_missing_columns: false}
  source: /runtime/services/tables.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/anvil/secrets.yml
